<ion-content>
  <ion-menu-button class="white-menu-btn floating-menu"><ion-icon name="apps"></ion-icon></ion-menu-button>
      <ion-button
    fill="clear"
    class="white-menu-btn floating-back"
    (click)="goBack()"
  >
    BACK
  </ion-button>
  <div id="bg">


  </div>
  <h5 style="text-align: center; font-weight: bold;">MY BOOKINGS</h5>
<br>
<!-- Loading -->
  <div *ngIf="loading" style="text-align:center;margin-top:40px;">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <!-- No bookings -->
  <ion-card *ngIf="!loading && bookings.length === 0">
    <ion-card-content>
      You have no bookings yet.
    </ion-card-content>
  </ion-card>

  <!-- Booking list -->
  <ion-list *ngIf="!loading && bookings.length > 0">

<ion-card *ngFor="let b of bookings" class="booking-card">

  <ion-card-header>
    <ion-card-title>
      {{b.vehicleName}}
    </ion-card-title>

    <ion-badge color="success" *ngIf="b.isConfirmed && !b.isPaid">
      Confirmed
    </ion-badge>

    <ion-badge color="primary" *ngIf="b.isPaid">
      Paid
    </ion-badge>

    <ion-badge color="warning" *ngIf="!b.isConfirmed">
      Pending
    </ion-badge>

  </ion-card-header>

  <ion-card-content>

    <div class="booking-row">
      <ion-icon name="calendar-outline"></ion-icon>
      <span>
        {{b.fromDate | date:'mediumDate'}} → {{b.untilDate | date:'mediumDate'}}
      </span>
    </div>

    <div class="booking-row">
      <ion-icon name="location-outline"></ion-icon>
      <span>{{b.pickupLocation}}</span>
    </div>

    <div class="booking-row">
      <ion-icon name="time-outline"></ion-icon>
      <span>{{b.estimatedDays}} days</span>
    </div>

    <div class="booking-row total">
      <span>Total</span>
      <strong>R {{b.grandTotal}}</strong>
    </div>

    <ion-button
  expand="block"
  color="primary"
  size="medium"
  *ngIf="b.isConfirmed && !b.isPaid"
  (click)="pay(b)"
>
  Pay Now
</ion-button>

<ion-button
  expand="block"
  color="danger"
  size="small"
  *ngIf="!b.isPaid"
  (click)="confirmCancel(b.bookingId)"
>
  Cancel Booking
</ion-button>

  </ion-card-content>

</ion-card>

  </ion-list>

</ion-content>
