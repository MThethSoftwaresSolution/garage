        <ion-icon name="home-outline"></ion-icon>
        <ion-label>Home</ion-label>
      </div>

    <ion-tab-button tab="host-dashboard">
      <div class="tab-shell">
        <ion-icon name="car-sport-outline"></ion-icon>
